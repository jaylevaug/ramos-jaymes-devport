name: Deploy static content to Pages
on:
  push:
    branches: ["main"]
  workflow_dispatch:

permissions:
  contents: read
  pages: write
  id-token: write

concurrency:
  group: "pages"
  cancel-in-progress: false

jobs:
  deploy:
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Cleanup Disk Space
        run: |
          sudo rm -rf /usr/share/dotnet
          sudo rm -rf /usr/local/lib/android
          sudo rm -rf /opt/ghc

      - name: Install Bun
        uses: oven-sh/setup-bun@v2
        with:
          bun-version: latest

      - name: Install dependencies
        run: bun install

      - name: Build project
        run: |
          # 1. Run the build with the production flag
          bun run build
          
          # 2. Debug: List all files so we can see where they went
          echo "--- DEBUG: LISTING ALL FILES ---"
          find . -maxdepth 3 -not -path '*/.*'
          
          # 3. Create deployment folder
          mkdir -p deploy_me
          
          # 4. Copy the files from the most likely output locations
          if [ -d ".output/public" ]; then
            cp -r .output/public/* deploy_me/
          elif [ -d "dist/client" ]; then
            cp -r dist/client/* deploy_me/
          elif [ -d "dist" ]; then
            cp -r dist/* deploy_me/
          fi
          
          # 5. Safety check: If index.html is still missing, we create a basic one
          # so the deployment doesn't fail, but we'll know the build is 'Empty'
          if [ ! -f "deploy_me/index.html" ]; then
            echo "<html><body><h1>Static Build Failed</h1><p>Check app.config.ts prerender settings.</p></body></html>" > deploy_me/index.html
          fi
          
          cp deploy_me/index.html deploy_me/404.html
        env:
          VITE_LOVABLE_TAGGER: false
          CI: false

      - name: Upload artifact
        uses: actions/upload-pages-artifact@v3
        with:
          path: 'deploy_me'

      - name: Deploy to GitHub Pages
        id: deployment
        uses: actions/deploy-pages@v4
