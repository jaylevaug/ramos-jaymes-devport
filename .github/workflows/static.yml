name: Deploy static content to Pages
on:
  push:
    branches: ["main"]
  workflow_dispatch:

permissions:
  contents: read
  pages: write
  id-token: write

concurrency:
  group: "pages"
  cancel-in-progress: false

env:
  FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: true

jobs:
  deploy:
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Install Bun
        uses: oven-sh/setup-bun@v2
        with:
          bun-version: latest

      - name: Install dependencies
        run: bun install

      - name: Build project
        run: |
          bun run build
          # We check which folder exists and make sure index.html is there
          if [ -d ".output/public" ]; then
            cp .output/public/index.html .output/public/404.html || true
            echo "DEPLOY_PATH=.output/public" >> $GITHUB_ENV
          elif [ -d "dist" ]; then
            cp dist/index.html dist/404.html || true
            echo "DEPLOY_PATH=dist" >> $GITHUB_ENV
          else
            echo "No build folder found!"
            exit 1
          fi
        env:
          VITE_LOVABLE_TAGGER: false
          CI: false

      - name: Setup Pages
        uses: actions/configure-pages@v4

      - name: Upload artifact
        uses: actions/upload-pages-artifact@v3
        with:
          path: ${{ env.DEPLOY_PATH }}

      - name: Deploy to GitHub Pages
        id: deployment
        uses: actions/deploy-pages@v4
