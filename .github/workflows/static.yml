name: Deploy static content to Pages
on:
  push:
    branches: ["main"]
  workflow_dispatch:

permissions:
  contents: read
  pages: write
  id-token: write

concurrency:
  group: "pages"
  cancel-in-progress: false

jobs:
  deploy:
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Cleanup Disk Space
        run: |
          sudo rm -rf /usr/share/dotnet
          sudo rm -rf /usr/local/lib/android
          sudo rm -rf /opt/ghc
          sudo rm -rf "/usr/local/share/boost"
          sudo rm -rf "$AGENT_TOOLSDIRECTORY"

      - name: Install Bun
        uses: oven-sh/setup-bun@v2
        with:
          bun-version: latest

      - name: Install dependencies
        run: bun install

      - name: Build project
        run: |
          bun run build
          # Based on your logs, the files are in dist/client
          # We check if index.html exists there first
          if [ -f "dist/client/index.html" ]; then
            cp dist/client/index.html dist/client/404.html
          else
            echo "Searching for index.html..."
            ACTUAL_PATH=$(find dist -name index.html | head -n 1)
            cp "$ACTUAL_PATH" "$(dirname "$ACTUAL_PATH")/404.html"
          fi
        env:
          VITE_LOVABLE_TAGGER: false
          CI: false

      - name: Upload artifact
        uses: actions/upload-pages-artifact@v3
        with:
          # Pointing to the correct folder from your logs
          path: 'dist/client'

      - name: Deploy to GitHub Pages
        id: deployment
        uses: actions/deploy-pages@v4
