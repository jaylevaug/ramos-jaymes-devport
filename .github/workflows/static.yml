name: Deploy static content to Pages
on:
  push:
    branches: ["main"]
  workflow_dispatch:

permissions:
  contents: read
  pages: write
  id-token: write

concurrency:
  group: "pages"
  cancel-in-progress: false

env:
  FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: true

jobs:
  deploy:
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Install Bun
        uses: oven-sh/setup-bun@v2
        with:
          bun-version: latest

      - name: Install dependencies
        run: bun install

      - name: Build project
        run: |
          bun run build
          # This part finds where the build folder is and names it 'deploy_me'
          if [ -d ".output/public" ]; then
            mv .output/public deploy_me
          elif [ -d "dist" ]; then
            mv dist deploy_me
          else
            # If standard folders aren't found, search for where index.html is
            BUILD_DIR=$(find . -name index.html -not -path "./node_modules/*" -not -path "./src/*" | head -n 1 | xargs dirname)
            cp -r $BUILD_DIR deploy_me
          fi
          # Create the 404 fallback
          cp deploy_me/index.html deploy_me/404.html
        env:
          VITE_LOVABLE_TAGGER: false
          CI: false

      - name: Upload artifact
        uses: actions/upload-pages-artifact@v3
        with:
          path: 'deploy_me'

      - name: Deploy to GitHub Pages
        id: deployment
        uses: actions/deploy-pages@v4
