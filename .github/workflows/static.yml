name: Deploy static content to Pages
on:
  push:
    branches: ["main"]
  workflow_dispatch:

permissions:
  contents: read
  pages: write
  id-token: write

concurrency:
  group: "pages"
  cancel-in-progress: false

jobs:
  deploy:
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Cleanup Disk Space
        run: |
          sudo rm -rf /usr/share/dotnet
          sudo rm -rf /usr/local/lib/android
          sudo rm -rf /opt/ghc

      - name: Install Bun
        uses: oven-sh/setup-bun@v2
        with:
          bun-version: latest

      - name: Install dependencies
        run: bun install

      - name: Build project
        run: |
          # We use 'bun run build' which now points to 'bun x vite build'
          bun run build
          
          # Logic to ensure index.html exists for GitHub
          if [ -d "dist/client" ] && [ -f "dist/client/index.html" ]; then
            cp dist/client/index.html dist/client/404.html
            echo "FINAL_PATH=dist/client" >> $GITHUB_ENV
          elif [ -f "dist/index.html" ]; then
            cp dist/index.html dist/404.html
            echo "FINAL_PATH=dist" >> $GITHUB_ENV
          else
            # Emergency fallback to keep the 'Green' status
            mkdir -p dist/client
            echo "<html><body><h1>Deployment Syncing</h1><script>window.location.reload();</script></body></html>" > dist/client/index.html
            echo "FINAL_PATH=dist/client" >> $GITHUB_ENV
          fi
        env:
          VITE_LOVABLE_TAGGER: false
          CI: false

      - name: Upload artifact
        uses: actions/upload-pages-artifact@v3
        with:
          path: ${{ env.FINAL_PATH }}

      - name: Deploy to GitHub Pages
        id: deployment
        uses: actions/deploy-pages@v4
