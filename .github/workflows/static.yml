name: Deploy static content to Pages
on:
  push:
    branches: ["main"]
  workflow_dispatch:

permissions:
  contents: read
  pages: write
  id-token: write

concurrency:
  group: "pages"
  cancel-in-progress: false

jobs:
  deploy:
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Cleanup Disk Space
        run: |
          sudo rm -rf /usr/share/dotnet
          sudo rm -rf /usr/local/lib/android
          sudo rm -rf /opt/ghc

      - name: Install Bun
        uses: oven-sh/setup-bun@v2
        with:
          bun-version: latest

      - name: Install dependencies
        run: bun install

      - name: Build project
        run: |
          # 1. Run the build
          bun run build
          
          # 2. Create the final deployment folder
          mkdir -p final_output
          
          # 3. Look for the real index.html in common TanStack/Vite locations
          # We check dist/client first, then .output/public, then dist
          if [ -d "dist/client" ] && [ -f "dist/client/index.html" ]; then
            echo "Found files in dist/client"
            cp -r dist/client/* final_output/
          elif [ -d ".output/public" ]; then
            echo "Found files in .output/public"
            cp -r .output/public/* final_output/
          elif [ -d "dist" ] && [ -f "dist/index.html" ]; then
            echo "Found files in dist"
            cp -r dist/* final_output/
          else
            echo "CRITICAL ERROR: No index.html found in any build folder!"
            exit 1
          fi

          # 4. Create the 404 fallback
          cp final_output/index.html final_output/404.html
        env:
          VITE_LOVABLE_TAGGER: false
          CI: false

      - name: Upload artifact
        uses: actions/upload-pages-artifact@v3
        with:
          path: 'final_output'

      - name: Deploy to GitHub Pages
        id: deployment
        uses: actions/deploy-pages@v4
